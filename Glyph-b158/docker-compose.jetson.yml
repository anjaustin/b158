version: '3.8'

services:
  bitnet-jetson:
    build:
      context: .
      dockerfile: Dockerfile.jetson.optimized
    image: bitnet-jetson:latest
    container_name: bitnet-jetson-container
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - CUDA_VISIBLE_DEVICES=all
    volumes:
      - ./BitNet:/workspace/BitNet
      - ./models:/workspace/models
      - ./output:/workspace/output
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    command: /bin/bash
